name: Aternos Keep Alive Bot

on:
  push:
    branches: [ main ]
  schedule:
    # Restarts automatically every 50 minutes to keep the connection fresh
    - cron: '*/50 * * * *'
  workflow_dispatch: # Allows you to manually click "Run" from GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Execute Bedrock Bot
        timeout-minutes: 60 
        run: node bot.js
